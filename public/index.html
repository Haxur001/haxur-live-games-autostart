<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HAXUR LIVE GAMES V4</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/hud.css" />
  <link rel="stylesheet" href="css/leaderboard.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/games.css" />
</head>

<body>
  <div id="app">

    <section id="hudRoot">

      <div id="topHud">
        <div id="brandBox">
          <div id="brandTitle">HAXUR LIVE GAMES</div>
          <div id="brandSubTitle">V4 GAME ENGINE</div>
        </div>

        <div id="gameStatusBox">
          <div id="gameName">GIFT BATTLE</div>
          <div id="statusText">VÁRAKOZÁS</div>
        </div>

        <div id="timerBox">
          <div id="roundText">Kör: 0/10</div>
          <div id="timerText">45s</div>
        </div>
      </div>

      <div id="teamScorePanel">
        <div id="redTeam" class="teamCard red">
          <div class="teamLabel">RED TEAM</div>
          <div id="redScore" class="teamScore">0</div>
        </div>

        <div id="blueTeam" class="teamCard blue">
          <div class="teamLabel">BLUE TEAM</div>
          <div id="blueScore" class="teamScore">0</div>
        </div>
      </div>

      <div id="leftPanel">
        <div class="panelTitle">TOP PLAYERS</div>
        <div id="leaderboard">
          <div class="emptyRow">Még nincs játékos</div>
        </div>
      </div>

      <div id="rightPanel">
        <div class="panelTitle">LIVE EVENTS</div>
        <div id="eventFeed">
          <div class="feedItem">Várakozás...</div>
        </div>
      </div>

      <div id="centerGameBox">
        <div id="mainGameTitle">HAXUR ARENA</div>
        <div id="mainGameText">Indítsd el a játékot</div>
      </div>

      <div id="bottomBar">
        <div id="lastGiftBox">Utolsó gift: nincs</div>
        <div id="comboBox">Combo: 0x</div>
        <div id="viewerBox">Játékosok: 0</div>
      </div>

    </section>

    <div id="testPanel">
      <button onclick="HaxurApp.start()">START</button>
      <button onclick="HaxurApp.stop()">STOP</button>
      <button onclick="HaxurApp.testGift()">TEST GIFT</button>
      <button onclick="HaxurApp.testTap()">TEST TAP</button>
      <button onclick="HaxurApp.testChat()">TEST CHAT</button>
    </div>

  </div>

  <script src="js/utils.js"></script>
  <script src="js/events.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/gameEngine.js"></script>
  <script src="js/tiktokConnector.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
